name: Release

# Publishes the package to npm via OIDC trusted publishing (no long-lived
# NPM_TOKEN). Fires when a v* tag is pushed, or manually via the Actions tab.
#
# Prerequisites:
#   1. The package must exist on npm (do one manual `npm publish` first).
#   2. On npmjs.com: package → Settings → Trusted Publisher → GitHub Actions
#      (org/user: Nagatatz, repo: jpyc-tipjar-widget, workflow: release.yml).
#   Do NOT set NODE_AUTH_TOKEN / NPM_TOKEN — npm exchanges the OIDC token.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write          # required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - run: npm install -g npm@latest   # ensure OIDC support (npm >= 11.5.1)

      # Guard: the git tag (v1.2.3) must match package.json version (1.2.3),
      # so we never publish a mislabeled release. Skipped on manual runs.
      - name: Verify tag matches package.json version
        if: github.ref_type == 'tag'
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          echo "package.json=$PKG  tag=$TAG"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match package.json version '$PKG'"
            exit 1
          fi

      # Skip publishing if this exact version is already on npm (e.g. when an
      # old tag is re-pushed / backfilled). Avoids a failed duplicate publish.
      - name: Check if version is already published
        id: published
        run: |
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION is already published — skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # `npm publish` runs prepublishOnly (rescript clean && build). Via OIDC
      # no auth token is needed and provenance is attached automatically.
      - if: steps.published.outputs.exists == 'false'
        run: npm publish --provenance --access public
